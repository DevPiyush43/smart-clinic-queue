services:
  - type: web
    name: smart-clinic-queue-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && cd ../web && npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # You will provide this later in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secure secret automatically
      - key: WEB_URL
        sync: false # You will provide this later when deploying the web app
